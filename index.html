<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Tàu - Firebase</title>
<style>
body { font-family: Arial; padding: 10px; background:#f5f5f5 }
.card { background:#fff; padding:15px; margin-bottom:10px; border-radius:10px }
input, select, button { width:100%; margin:5px 0; padding:8px }
button { background:#007bff; color:white; border:none; border-radius:5px }
table { width:100%; border-collapse: collapse; margin-top:10px }
th, td { border:1px solid #ddd; padding:8px; text-align:center }
</style>
</head>
<body><h2>🚢 Quản Lý Tàu (Firebase)</h2><div class="card">
<h3>Chọn tàu</h3>
<select id="ship">
<option value="tau_01">Tàu 01</option>
<option value="tau_02">Tàu 02</option>
</select>
</div><div class="card">
<h3>Nhập công việc</h3>
<input type="date" id="date">
<input type="number" id="workers" placeholder="Số người">
<input type="text" id="job" placeholder="Công việc">
<button onclick="saveLog()">Lưu</button>
</div><div class="card">
<h3>Dữ liệu</h3>
<div id="table"></div>
</div><script type="module">
// IMPORT FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ⚠️ DÁN CONFIG FIREBASE CỦA BẠN VÀO ĐÂY
const firebaseConfig = {
  apiKey: "AIzaSyCdBCy8ttrdcfQoSPr3nNmsynmBtnkYv0o",
  authDomain: "ship-90534.firebaseapp.com",
  databaseURL: "https://ship-90534-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ship-90534",
  storageBucket: "ship-90534.firebasestorage.app",
  messagingSenderId: "414371290775",
  appId: "1:414371290775:web:b791eebfacf3e32f1b13d2",
  measurementId: "G-JXQMFXNMV0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// SAVE
window.saveLog = function(){
  push(ref(db, "logs"), {
    ship_id: ship.value,
    date: date.value,
    workers: workers.value,
    job: job.value
  });
  alert("Đã lưu Firebase");
}

// LOAD REALTIME
onValue(ref(db, "logs"), snapshot => {
  let data = snapshot.val();
  renderTable(data);
});

// DELETE
window.deleteLog = function(id){
  remove(ref(db, "logs/"+id));
}

function renderTable(data){
  if(!data){ table.innerHTML = "Không có dữ liệu"; return; }

  let html = "<table><tr><th>Tàu</th><th>Ngày</th><th>Người</th><th>Công việc</th><th>Xóa</th></tr>";

  Object.keys(data).forEach(id=>{
    let x = data[id];
    // Hiển thị tất cả tàu (có thể lọc nếu cần)

    html += `<tr>
      <td>${x.ship_id}</td>
      <td>${x.date}</td>
      <td>${x.workers}</td>
      <td>${x.job}</td>
      <td><button onclick="deleteLog('${id}')">X</button></td>
    </tr>`
  });

  html += "</table>";
  table.innerHTML = html;
}

</script></body>
</html>
