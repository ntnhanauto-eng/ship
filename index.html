<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Tàu - Firebase (Filter + Summary)</title>
<style>
body { font-family: Arial; padding: 10px; background:#f5f5f5 }
.card { background:#fff; padding:15px; margin-bottom:10px; border-radius:10px }
input, select, button { width:100%; margin:5px 0; padding:8px }
button { background:#007bff; color:white; border:none; border-radius:5px }
table { width:100%; border-collapse: collapse; margin-top:10px }
th, td { border:1px solid #ddd; padding:8px; text-align:center }
.flex { display:grid; grid-template-columns:1fr 1fr; gap:10px }
</style>
</head>
<body><h2>🚢 Quản Lý Tàu (Filter + Tổng hợp)</h2><div class="card">
<h3>Chọn tàu</h3>
<select id="ship">
<option value="all">Tất cả</option>
<option value="tau_01">Tàu 01</option>
<option value="tau_02">Tàu 02</option>
</select>
</div><div class="card">
<h3>Nhập công việc</h3>
<input type="date" id="date">
<input type="number" id="workers" placeholder="Số người">
<input type="text" id="job" placeholder="Công việc">
<button onclick="saveLog()">Lưu</button>
</div><div class="card">
<h3>Bộ lọc</h3>
<div class="flex">
<input type="date" id="fromDate">
<input type="date" id="toDate">
</div>
<input type="text" id="jobFilter" placeholder="Lọc theo công việc">
<button onclick="applyFilter()">Áp dụng lọc</button>
</div><div class="card">
<h3>Dữ liệu</h3>
<div id="table"></div>
</div><div class="card">
<h3>Tổng hợp</h3>
<button onclick="showSummary()">Tổng hợp</button>
<div id="summary"></div>
</div>
  
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ship-90534.firebaseapp.com",
  databaseURL: "https://ship-90534-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ship-90534",
  storageBucket: "ship-90534.firebasestorage.app",
  messagingSenderId: "414371290775",
  appId: "1:414371290775:web:b791eebfacf3e32f1b13d2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// LẤY DOM (QUAN TRỌNG)
const ship = document.getElementById("ship");
const date = document.getElementById("date");
const workers = document.getElementById("workers");
const job = document.getElementById("job");

const fromDate = document.getElementById("fromDate");
const toDate = document.getElementById("toDate");
const jobFilter = document.getElementById("jobFilter");

const table = document.getElementById("table");
const summary = document.getElementById("summary");

let rawData = {};

// Lưu dữ liệu
window.saveLog = function(){
  push(ref(db, "logs"), {
    ship_id: ship.value === 'all' ? 'tau_01' : ship.value,
    date: date.value,
    workers: Number(workers.value),
    job: job.value
  });
  alert("Đã lưu Firebase");
}

// Load dữ liệu realtime
onValue(ref(db, "logs"), snapshot => {
  rawData = snapshot.val() || {};
  renderTable(Object.values(rawData));
});

// FILTER
window.applyFilter = function(){
  let data = Object.values(rawData);

  let from = fromDate.value;
  let to = toDate.value;
  let jobF = jobFilter.value.trim().toLowerCase();
  let shipF = ship.value;

  let filtered = data.filter(x=>{
    let ok = true;

    if(shipF !== 'all'){
      ok = ok && (x.ship_id === shipF);
    }

    if(from){
      ok = ok && (x.date >= from);
    }

    if(to){
      ok = ok && (x.date <= to);
    }

    if(jobF){
      ok = ok && (x.job && x.job.toLowerCase().includes(jobF));
    }

    return ok;
  });

  renderTable(filtered);
}

// HIỂN THỊ TABLE
function renderTable(data){
  let html = "<table><tr><th>Tàu</th><th>Ngày</th><th>Người</th><th>Công việc</th></tr>";

  data.forEach(x=>{
    html += `<tr>
      <td>${x.ship_id}</td>
      <td>${x.date}</td>
      <td>${x.workers}</td>
      <td>${x.job}</td>
    </tr>`;
  });

  html += "</table>";
  table.innerHTML = html;
}

// TỔNG HỢP
window.showSummary = function(){
  let data = Object.values(rawData);

  let result = {};

  data.forEach(x=>{
    if(!result[x.ship_id]){
      result[x.ship_id] = {
        totalWorkers:0,
        days:new Set()
      }
    }

    result[x.ship_id].totalWorkers += Number(x.workers);
    result[x.ship_id].days.add(x.date);
  });

  let html = "";

  for(let ship in result){
    html += `<p><b>${ship}</b>: Tổng người = ${result[ship].totalWorkers}, Số ngày = ${result[ship].days.size}</p>`;
  }

  summary.innerHTML = html;
}
</script>
</body>
</html>
